[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]

# Compiler
solc = "0.8.34"
evm_version = "cancun"

# Optimizer
optimizer = true
optimizer_runs = 200

# Testing
verbosity = 2

# Named RPC endpoints for fork tests and deployment scripts.
[rpc_endpoints]
optimism_sepolia = "${OP_SEPOLIA_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

# Contract verification for Base Sepolia (Etherscan V2 multichain API key).
[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532, url = "https://api.etherscan.io/v2/api" }
